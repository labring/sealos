# Default values for license frontend helm chart.

image: ghcr.io/labring/sealos-license-frontend:latest
imagePullPolicy: Always

imagePullSecrets: []
fullnameOverride: "license-frontend"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "license-frontend"

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - 'ALL'

service:
  type: ClusterIP
  port: 3000

app:
  namespace: ns-admin

startupProbe:
  httpGet:
    path: /
    port: 3000
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 30

readinessProbe:
  httpGet:
    path: /
    port: 3000
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /
    port: 3000
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

tests:
  image: busybox:1.36.1
  path: /

ingress:
  className: nginx
  host: ""
  cloudPort: 443
  certSecretName: wildcard-cert
  annotations: {}

# License frontend configuration
# Note: cloudDomain and mongodbURI are auto-configured by entrypoint.sh from sealos-config ConfigMap
# For business configuration (licensePurchaseDomain), see license-frontend-values.yaml
licenseConfig:
  cloudDomain: "127.0.0.1.nip.io"  # Auto-injected by entrypoint script
  mongodbURI: ""   # Auto-injected by entrypoint script

# Affinity for pod anti-affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: "app"
                operator: In
                values:
                  - license-frontend
          topologyKey: "kubernetes.io/hostname"
