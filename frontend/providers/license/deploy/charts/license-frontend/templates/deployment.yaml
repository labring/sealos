apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "license-frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "license-frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "license-frontend.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        {{- include "license-frontend.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "license-frontend.serviceAccountName" . }}
      containers:
        - name: {{ .Chart.Name }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: SEALOS_DOMAIN
              value: {{ .Values.licenseConfig.cloudDomain | quote }}
            - name: LICENSE_DOMAIN
              value: {{ .Values.licenseConfig.licensePurchaseDomain | quote }}
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ include "license-frontend.fullname" . }}-secret
                  key: mongodb_uri
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - 'ALL'
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          image: "{{ .Values.image }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          volumeMounts:
            - name: license-frontend-volume
              mountPath: /config.yaml
              subPath: config.yaml
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: license-frontend-volume
          configMap:
            name: {{ include "license-frontend.fullname" . }}-config
