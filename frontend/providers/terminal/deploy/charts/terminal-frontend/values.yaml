# Default values for terminal frontend helm chart.

image: ghcr.io/labring/sealos-terminal-frontend:latest
imagePullPolicy: Always

imagePullSecrets: []
fullnameOverride: "terminal-frontend"

replicaCount: 1

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - "ALL"

service:
  type: ClusterIP
  port: 3000

resources:
  limits:
    cpu: 2000m
    memory: 2048Mi
  requests:
    cpu: 10m
    memory: 128Mi

ingress:
  className: nginx
  name: sealos-terminal
  host: ""
  annotations: {}

# Terminal frontend configuration.
# cloudDomain, cloudPort, httpPort, disableHttps and certSecretName are auto-configured by entrypoint.sh from sealos-config.
terminalConfig:
  cloudDomain: "127.0.0.1.nip.io"
  cloudPort: ""
  httpPort: ""
  disableHttps: false
  certSecretName: "wildcard-cert"
  ttydImage: "docker.io/labring4docker/terminal:1.25.1-5"
  keepalived: "30m"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: "app"
                operator: In
                values:
                  - terminal-frontend
          topologyKey: "kubernetes.io/hostname"
