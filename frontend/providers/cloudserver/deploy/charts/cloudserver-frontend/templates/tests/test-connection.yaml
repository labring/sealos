apiVersion: v1
kind: Pod
metadata:
  name: {{ include "cloudserver-frontend.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    helm.sh/chart: {{ include "cloudserver-frontend.chart" . }}
    app.kubernetes.io/name: {{ include "cloudserver-frontend.name" . }}-test
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: {{ .Values.tests.image | quote }}
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-ec"]
      args:
        - wget -q -T 10 -O /dev/null "http://{{ include "cloudserver-frontend.fullname" . }}:{{ .Values.service.port }}{{ .Values.tests.path }}"
