apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-version-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dbprovider-frontend.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-version-reader
  labels:
    {{- include "dbprovider-frontend.labels" . | nindent 4 }}
rules:
  - apiGroups: [ 'extensions.kubeblocks.io' ]
    resources: [ 'addons' ]
    verbs: [ 'get', 'watch', 'list' ]
  - apiGroups: ['apps.kubeblocks.io']
    resources: ['clusterversions']
    verbs: ['get', 'watch', 'list']
  - apiGroups: ['dataprotection.kubeblocks.io']
    resources: ['backuprepos']
    verbs: ['get', 'watch', 'list']
  - apiGroups: ['app.sealos.io']
    resources: ['apps']
    resourceNames: ['dataflow']
    verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-version-reader-rolebinding
  labels:
    {{- include "dbprovider-frontend.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-version-reader
subjects:
  - kind: ServiceAccount
    name: cluster-version-reader
    namespace: {{ .Release.Namespace }}
