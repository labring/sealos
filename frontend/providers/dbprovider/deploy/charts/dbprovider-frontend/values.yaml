# Default values for dbprovider frontend helm chart.

image: ghcr.io/labring/sealos-dbprovider-frontend:latest
imagePullPolicy: Always

imagePullSecrets: []
fullnameOverride: "dbprovider-frontend"

replicaCount: 1

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - "ALL"

service:
  type: ClusterIP
  port: 3000

resources:
  limits:
    cpu: 2000m
    memory: 2048Mi
  requests:
    cpu: 10m
    memory: 128Mi

ingress:
  className: nginx
  host: ""
  annotations: {}

# Keep release-v5.1 env defaults and names. Entrypoint auto-fills cloud values from sealos-config when available.
dbproviderConfig:
  cloudDomain: "127.0.0.1.nip.io"
  cloudPort: ""
  certSecretName: "wildcard-cert"
  monitorUrl: "http://database-monitor.sealos.svc.cluster.local:9090"
  minioUrl: ""
  minioAccessKey: ""
  minioSecretKey: ""
  minioPort: ""
  migrateFileImage: ""
  minioBucketName: ""
  backupEnabled: "false"
  showDocument: "true"
  guideEnabled: "true"
  billingUrl: "http://account-service.account-system.svc:2333"
  managedDbEnabled: "false"
  vlogsBaseUrl: "http://service-vlogs.sealos.svc.cluster.local:8428"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: "app"
                operator: In
                values:
                  - dbprovider-frontend
          topologyKey: "kubernetes.io/hostname"
