# yaml-language-server: $schema=config.schema.json

cloud:
  domain: cloud.sealos.io
  port: 443
  regionUid: ''

devbox:
  ui:
    docUrls:
      docs:
        zh: https://sealos.run/docs/overview/intro
        en: https://sealos.io/docs/overview/intro
      privacy:
        zh: https://sealos.run/docs/msa/privacy-policy
        en: https://sealos.io/docs/msa/privacy-policy
    currencySymbolType: shellCoin
    customScripts: []

  features:
    guide: false
    importTemplate: false
    webide: false
    advancedSettings: false
    affinityScheduling: true

  runtime:
    rootNamespace: devbox-system
    defaultNamespace: default
    sshDomain: cloud.sealos.io
    registryHost: hub.sealos.plus
    webidePort: 9999

  resources:
    storageLimit: 10Gi
    cpuMarks: [1, 2, 4, 8, 16]
    memoryMarks: [2, 4, 8, 16, 32]
    storageClassNfs: nfs-csi

  components:
    appLaunchpad:
      url: https://applaunchpad.cloud.sealos.io
    monitoring:
      url: http://monitor.sealos.svc.cluster.local:8428
    retagService:
      url: ''
    account:
      url: ''
    gpu:
      enabled: false

  userDomain:
    domain: sealosusw.site
    secretName: wildcard-cert

  security:
    domainChallengeSecret: default-dev-secret-change-in-production
    jwtSecret: default-dev-jwt-secret-change-in-production

  mcp:
    forcedLanguage: en
