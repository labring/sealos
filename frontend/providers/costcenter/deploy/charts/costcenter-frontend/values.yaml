# Default values for costcenter frontend helm chart.

image: ghcr.io/labring/sealos-costcenter-frontend:latest
imagePullPolicy: Always

imagePullSecrets: []
fullnameOverride: "costcenter-frontend"

podAnnotations: {}
podLabels: {}

replicaCount: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - 'ALL'

service:
  type: ClusterIP
  port: 3000

resources:
  limits:
    cpu: 1000m
    memory: 2048Mi
  requests:
    cpu: 10m
    memory: 128Mi

# Costcenter frontend configuration
# Note: jwtInternal is auto-configured by entrypoint.sh from sealos-config ConfigMap
# For business configurations (transfer, invoice, recharge, etc.), see costcenter-frontend-values.yaml
costcenterConfig:
  jwtInternal: ""  # Auto-injected by entrypoint script
  transferEnabled: true
  currencyType: "shellCoin"
  invoice:
    enabled: false
    feiShuBotURL: ""
    aliSms:
      endpoint: ""
      accessKeyID: ""
      accessKeySecret: ""
      templateCode: ""
      signName: ""
      invoiceCompletedTemplateCode: ""
    mongo:
      uri: ""
  recharge:
    enabled: false
    payMethods:
      wechat:
        enabled: false
      alipay:
        enabled: false
      stripe:
        enabled: false
        publicKey: ""
  components:
    accountService:
      url: "http://account-service.account-system.svc:2333"

# Affinity for pod anti-affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: "app"
                operator: In
                values:
                  - costcenter-frontend
          topologyKey: "kubernetes.io/hostname"
