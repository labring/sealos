# Default values for costcenter frontend helm chart.

image: ghcr.io/labring/sealos-costcenter-frontend:latest
imagePullPolicy: Always

imagePullSecrets: []
fullnameOverride: "costcenter-frontend"

replicaCount: 1

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - 'ALL'

service:
  type: ClusterIP
  port: 3000

resources:
  limits:
    cpu: 1000m
    memory: 2048Mi
  requests:
    cpu: 10m
    memory: 128Mi

ingress:
  className: nginx
  host: ""
  annotations: {}

tests:
  image: busybox:1.36.1
  path: /api/platform/getAppConfig

startupProbe:
  httpGet:
    path: /api/platform/getAppConfig
    port: 3000
  periodSeconds: 2
  timeoutSeconds: 3
  failureThreshold: 30
readinessProbe:
  httpGet:
    path: /api/platform/getAppConfig
    port: 3000
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6
livenessProbe:
  httpGet:
    path: /api/platform/getAppConfig
    port: 3000
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

# Costcenter frontend configuration
# Note: jwtInternal is auto-configured by entrypoint.sh from sealos-config ConfigMap
# For business configurations (transfer, invoice, recharge, etc.), see costcenter-frontend-values.yaml
costcenterConfig:
  cloudDomain: "127.0.0.1.nip.io"
  cloudPort: ""
  httpPort: ""
  disableHttps: false
  certSecretName: "wildcard-cert"
  jwtInternal: ""
  transferEnabled: true
  currencyType: "shellCoin"
  invoice:
    enabled: false
    # Deprecated compatibility key. Prefer invoice.feishApp.feiShuBotURL.
    feiShuBotURL: ""
    feishApp:
      appId: ""
      appSecret: ""
      feiShuBotURL: ""
      chatId: ""
      token: ""
      template:
        id: ""
        version: ""
    serviceToken: ""
    aliSms:
      endpoint: ""
      accessKeyID: ""
      accessKeySecret: ""
      templateCode: ""
      signName: ""
      invoiceCompletedTemplateCode: ""
    mongo:
      uri: ""
  recharge:
    enabled: false
    payMethods:
      wechat:
        enabled: false
      alipay:
        enabled: false
      stripe:
        enabled: false
        publicKey: ""
  components:
    accountService:
      url: "http://account-service.account-system.svc:2333"

# Affinity for pod anti-affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: "app"
                operator: In
                values:
                  - costcenter-frontend
          topologyKey: "kubernetes.io/hostname"
