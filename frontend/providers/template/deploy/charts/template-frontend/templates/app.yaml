apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: template
  namespace: app-system
spec:
  data:
    url: {{ include "template-frontend.appUrl" . | quote }}
  icon: {{ printf "%s/logo.svg" (include "template-frontend.appUrl" .) | quote }}
  i18n:
    zh:
      name: 应用商店
    zh-Hans:
      name: 应用商店
  menuData:
  name: App Store
  type: iframe
  displayType: normal
