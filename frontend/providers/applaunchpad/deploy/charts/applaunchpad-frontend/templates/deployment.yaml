apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "applaunchpad-frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "applaunchpad-frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "applaunchpad-frontend.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        {{- include "applaunchpad-frontend.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          command:
            - dumb-init
            - sh
            - -c
          args:
            - |
              set -e
              while IFS= read -r line || [ -n "$line" ]; do
                case "$line" in
                  ''|\#*) continue ;;
                esac
                key="${line%%=*}"
                value="${line#*=}"
                export "${key}=${value}"
              done < /app/data/.env
              exec node "${launchpath}"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          image: {{ .Values.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          volumeMounts:
            - mountPath: /app/data
              name: applaunchpad-frontend-volume
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: applaunchpad-frontend-volume
          configMap:
            defaultMode: 420
            name: {{ include "applaunchpad-frontend.fullname" . }}-config
