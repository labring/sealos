apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: applaunchpad
  namespace: app-system
spec:
  data:
    desc: App Launchpad
    url: {{ include "applaunchpad-frontend.url" . | quote }}
  icon: {{ printf "%s/logo.svg" (include "applaunchpad-frontend.url" .) | quote }}
