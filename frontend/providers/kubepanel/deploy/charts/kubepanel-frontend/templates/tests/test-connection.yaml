apiVersion: v1
kind: Pod
metadata:
  name: {{ include "kubepanel-frontend.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    helm.sh/chart: {{ include "kubepanel-frontend.chart" . }}
    app.kubernetes.io/name: {{ include "kubepanel-frontend.name" . }}-test
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: {{ .Values.tests.image | quote }}
      imagePullPolicy: {{ .Values.tests.imagePullPolicy }}
      command:
        - wget
      args:
        - --spider
        - --timeout=10
        - {{ printf "http://%s:%v%s" (include "kubepanel-frontend.fullname" .) .Values.service.port .Values.tests.path | quote }}
