<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switching Region</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: rgba(255, 255, 255, 0.95);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }

    .loading-container {
      text-align: center;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(0, 132, 255, 0.2);
      border-radius: 50%;
      border-top-color: #0084ff;
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 16px;
      color: #333;
      margin: 0;
    }

    .region-name {
      font-weight: bold;
      color: #0084ff;
    }
  </style>
</head>

<body>
  <div class="loading-container">
    <div class="loading-spinner"></div>
    <p class="loading-text">Switching to <span class="region-name" id="regionName">...</span> region</p>
  </div>

  <script>
    (function () {
      const DEFAULT_REGION = 'hzh.sealos.run'

      function getUrlParam (name) {
        const url = new URL(window.location.href)
        return url.searchParams.get(name)
      }

      function getCookie (name) {
        const value = `; ${document.cookie}`
        const parts = value.split(`; ${name}=`)
        if (parts.length === 2) return parts.pop().split(';').shift()
        return null
      }

      function setCookie (name, value, days) {
        const date = new Date()
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000))
        const expires = `; expires=${date.toUTCString()}`
        document.cookie = `${name}=${value}${expires}; path=/; SameSite=Lax; Secure`
      }

      function buildTargetUrl () {
        const url = new URL(window.location.href)
        const regionId = getUrlParam('regionId')
        const regionDomain = getUrlParam('regionDomain')

        if (regionDomain) {
          setCookie('latest_region', regionDomain, 30)
        }
        if (regionId) {
          setCookie('latest_region_id', regionId, 30)
        }

        const targetRegion = regionDomain || getCookie('latest_region') || DEFAULT_REGION

        let targetUrl = `https://${targetRegion}${url.pathname}`
        const params = url.searchParams.toString()

        if (params) {
          targetUrl += `?${params}`
        }

        return targetUrl
      }

      function init () {
        const regionDomain = getUrlParam('regionDomain')
        const savedRegion = getCookie('latest_region')

        const displayRegion = regionDomain || savedRegion || DEFAULT_REGION
        document.getElementById('regionName').textContent = displayRegion

        setTimeout(() => {
          window.location.href = buildTargetUrl()
        }, 1000)
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init)
      } else {
        init()
      }
    })();
  </script>
</body>

</html>
